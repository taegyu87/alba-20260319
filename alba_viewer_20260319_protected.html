<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alba 구역">
<meta name="theme-color" content="#0f1923">
<title>Alba 봉사구역 뷰어</title>
<style>
:root {
  --bg:#0f1923; --surface:#162030; --surface2:#1e2d3d; --border:#2a3f54;
  --accent:#3b82f6; --green:#10b981; --red:#ef4444; --yellow:#f59e0b;
  --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
  --row-red:rgba(239,68,68,.13); --row-green:rgba(16,185,129,.10);
  --row-yellow:rgba(245,158,11,.12); --row-gray:rgba(100,116,139,.10);
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px); --safe-r:env(safe-area-inset-right,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);
  font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased;}

/* ══ 잠금 화면 ══ */
#lock{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;
  padding-top:calc(40px + var(--safe-top));
  padding-bottom:calc(40px + var(--safe-bot));
}
.lock-ico{font-size:56px;margin-bottom:16px;}
.lock-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;}
.lock-sub{font-size:13px;color:var(--text3);margin-bottom:36px;}
.lock-box{
  width:100%;max-width:320px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:26px 22px;
  display:flex;flex-direction:column;gap:14px;
}
.lock-label{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
#pw-input{
  width:100%;padding:14px;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);
  font-size:20px;font-family:inherit;
  text-align:center;letter-spacing:6px;
  -webkit-appearance:none;outline:none;
  transition:border-color .2s;
}
#pw-input:focus{border-color:var(--accent);}
#pw-btn{
  width:100%;padding:15px;
  background:var(--accent);border:none;border-radius:10px;
  color:#fff;font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;-webkit-appearance:none;transition:opacity .15s;
}
#pw-btn:active{opacity:.75;}
#pw-err{text-align:center;font-size:13px;color:var(--red);min-height:18px;}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-9px);}
  40%{transform:translateX(9px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(4px);}
}
.shake{animation:shake .35s ease;}

/* ══ 앱 (잠금 해제 후) ══ */
#app{display:none;flex-direction:column;height:100dvh;
  padding-top:var(--safe-top);padding-left:var(--safe-l);padding-right:var(--safe-r);}

/* 툴바 */
#toolbar{display:flex;align-items:center;gap:10px;padding:9px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;flex-wrap:wrap;}
#toolbar h1{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.3px;white-space:nowrap;}
.tb-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.tb-lbl{font-size:12px;color:var(--text2);white-space:nowrap;}
#months-input{
  width:48px;padding:4px 6px;
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:14px;font-family:inherit;text-align:center;
  -webkit-appearance:none;
}
.btn{
  padding:5px 12px;border:none;border-radius:7px;
  font-size:12px;font-family:inherit;font-weight:700;
  cursor:pointer;white-space:nowrap;-webkit-appearance:none;transition:opacity .15s;
}
.btn:active{opacity:.7;}
.btn-green{background:var(--green);color:#fff;}
.btn-blue{background:var(--accent);color:#fff;}
.btn-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
#stat{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap;}

/* 탭 바 (모바일) */
#tab-bar{display:none;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
#tab-bar button{
  flex:1;padding:10px 0;background:none;
  border:none;border-bottom:2px solid transparent;
  color:var(--text2);font-size:13px;font-family:inherit;font-weight:600;
  cursor:pointer;transition:all .2s;-webkit-appearance:none;
}
#tab-bar button.active{color:var(--accent);border-bottom-color:var(--accent);}

/* 메인 */
#main{display:flex;flex:1;overflow:hidden;min-height:0;}

/* 사이드바 */
#sidebar{
  width:360px;min-width:260px;
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);background:var(--surface);flex-shrink:0;
}
#sidebar-top{padding:10px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
#sidebar-top h2{font-size:12px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
#search{
  width:100%;padding:8px 12px;
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:14px;font-family:inherit;-webkit-appearance:none;
}
#search:focus{outline:none;border-color:var(--accent);}
#t-head{
  display:grid;grid-template-columns:72px 1fr 52px 40px 68px;
  padding:5px 10px;font-size:10px;color:var(--text3);font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#t-head .c{text-align:center;}
#t-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.t-row{
  display:grid;grid-template-columns:72px 1fr 52px 40px 68px;
  padding:8px 10px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.04);
  font-size:12px;align-items:center;gap:2px;transition:background .12s;
}
.t-row:active{opacity:.75;}
.t-row.selected{background:#1d3557!important;outline:2px solid var(--accent);outline-offset:-2px;}
.t-row.tag-out{background:rgba(239,68,68,.1);}
.t-row.tag-warn{background:rgba(245,158,11,.1);}
.t-row.tag-ok{background:rgba(16,185,129,.06);}
.t-name{font-weight:700;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-area{color:var(--text2);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-uv{text-align:center;font-weight:700;font-size:12px;}
.t-uv.has{color:var(--red);} .t-uv.none{color:var(--green);}
.t-total{text-align:center;color:var(--text3);font-size:11px;}
.t-st{text-align:center;}
.badge{display:inline-block;padding:2px 5px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;}
.b-out{background:rgba(239,68,68,.25);color:#fca5a5;}
.b-ok{background:rgba(16,185,129,.2);color:#6ee7b7;}

/* 오른쪽 */
#content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#content-hdr{padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
#ch-title{font-size:13px;font-weight:700;}
#ch-sub{font-size:11px;color:var(--text2);margin-top:3px;}
#h-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{
  position:sticky;top:0;background:var(--surface2);padding:7px 10px;
  font-size:10px;color:var(--text3);font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;
  border-bottom:1px solid var(--border);white-space:nowrap;text-align:left;
}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;}
tbody tr:active{opacity:.7;}
tbody tr.sel-row{outline:2px solid var(--accent);outline-offset:-2px;}
tbody td{padding:7px 10px;vertical-align:top;font-size:12.5px;}
.row-r{background:var(--row-red);} .row-g{background:var(--row-green);}
.row-y{background:var(--row-yellow);} .row-x{background:var(--row-gray);color:var(--text3);}
.td-mk{text-align:center;font-weight:700;color:var(--accent);}
.td-dt{text-align:center;white-space:nowrap;font-size:11.5px;}
.td-st{text-align:center;white-space:nowrap;}
.td-note{color:var(--text2);font-size:11.5px;}
.sb{padding:2px 5px;border-radius:3px;font-size:10px;font-weight:700;}
.sb-new{background:rgba(59,130,246,.25);color:#93c5fd;}
.sb-valid{background:rgba(16,185,129,.2);color:#6ee7b7;}
.sb-dnc{background:rgba(100,116,139,.2);color:#9ca3af;}

/* 노트 패널 */
#note-panel{
  flex-shrink:0;border-top:1px solid var(--border);
  background:var(--surface);padding:10px 14px;
  padding-bottom:calc(10px + var(--safe-bot));max-height:130px;
}
#note-panel h3{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
#note-txt{font-size:13px;color:var(--text2);line-height:1.6;overflow-y:auto;max-height:80px;white-space:pre-wrap;word-break:break-all;-webkit-overflow-scrolling:touch;}

/* 빈 상태 */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text3);font-size:14px;}
.empty .ico{font-size:40px;}

/* 드래그 오버레이 */
#drop-ov{display:none;position:fixed;inset:0;background:rgba(59,130,246,.15);border:3px dashed var(--accent);z-index:9998;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--accent);}
#drop-ov.on{display:flex;}

/* 스크롤바 */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ══ 모바일 (≤768px) ══ */
@media(max-width:768px){
  #toolbar h1{font-size:13px;}
  #stat{display:none;}
  #tab-bar{display:flex;}
  #sidebar{width:100%;border-right:none;position:absolute;inset:0;z-index:10;}
  #sidebar.hidden{display:none;}
  #content{position:absolute;inset:0;}
  #content.hidden{display:none;}
  #main{position:relative;overflow:hidden;}
  .td-st,thead th:nth-child(4),.td-note,thead th:nth-child(5){display:none;}
  .t-row{padding:10px;min-height:44px;}
}
@media(max-width:420px){
  #toolbar{gap:6px;padding:8px 10px;}
  #toolbar h1{font-size:12px;}
  #months-input{width:42px;}
  .btn{padding:5px 9px;font-size:11px;}
}
</style>
</head>
<body>

<!-- 드래그 오버레이 -->
<div id="drop-ov">📂 HTML 파일을 여기에 놓으세요</div>

<!-- ══ 잠금 화면 ══ -->
<div id="lock">
  <div class="lock-ico">🔐</div>
  <div class="lock-title">Alba 봉사구역 뷰어</div>
  <div class="lock-sub">계속하려면 비밀번호를 입력하세요</div>
  <div class="lock-box">
    <div class="lock-label">비밀번호</div>

           autocomplete="off" autocorrect="off" spellcheck="false"
           inputmode="text">
    <button id="pw-btn" onclick="checkPW()">확인</button>
    <div id="pw-err"></div>
  </div>
</div>

<!-- ══ 앱 본체 ══ -->
<div id="app">
  <!-- 툴바 -->
  <div id="toolbar">
    <h1>🗺 Alba 구역 뷰어</h1>
    <div class="tb-sep"></div>
    <span class="tb-lbl">미방문 기준</span>
    <input id="months-input" type="number" value="3" min="0" step="0.5">
    <span class="tb-lbl">개월</span>
    <button class="btn btn-green" onclick="applyMonths()">적용</button>
    <div class="tb-sep"></div>
    <button class="btn btn-blue" onclick="document.getElementById('fi').click()">📂 파일 열기</button>
    <input id="fi" type="file" accept=".html" style="display:none" onchange="loadFile(this)">
    <button class="btn btn-gray" onclick="lockApp()" title="잠금">🔒</button>
    <span id="stat">로드 중...</span>
  </div>

  <!-- 탭 바 (모바일) -->
  <div id="tab-bar">
    <button id="tab-list" class="active" onclick="showTab('list')">📋 구역 목록</button>
    <button id="tab-detail" onclick="showTab('detail')">🏘 집 목록</button>
  </div>

  <!-- 메인 -->
  <div id="main">
    <!-- 사이드바 -->
    <div id="sidebar">
      <div id="sidebar-top">
        <h2>구역 목록</h2>
        <input id="search" type="text" placeholder="🔍 구역명 또는 지역 검색..." oninput="renderList()">
      </div>
      <div id="t-head">
        <span>구역명</span><span>지역</span>
        <span class="c">미방문</span><span class="c">전체</span><span class="c">상태</span>
      </div>
      <div id="t-list"></div>
    </div>

    <!-- 오른쪽 -->
    <div id="content">
      <div id="content-hdr">
        <div id="ch-title">← 구역을 선택하세요</div>
        <div id="ch-sub"></div>
      </div>
      <div id="h-wrap">
        <div class="empty" id="empty-msg">
          <span class="ico">🏘</span>
          구역을 선택하면 집 목록이 표시됩니다
        </div>
        <table id="h-table" style="display:none">
          <thead><tr>
            <th style="width:38px">#</th>
            <th>주소</th>
            <th style="width:82px;text-align:center">마지막방문</th>
            <th style="width:75px;text-align:center">상태</th>
            <th>노트 요약</th>
          </tr></thead>
          <tbody id="h-body"></tbody>
        </table>
      </div>
      <div id="note-panel">
        <h3>선택한 집 — 전체 노트</h3>
        <div id="note-txt" style="color:var(--text3);font-style:italic">집을 클릭하면 노트가 표시됩니다</div>
      </div>
    </div>
  </div>
</div><!-- /#app -->

<script>
// ═══════════════════════════════════════
// 비밀번호
// ═══════════════════════════════════════
const CORRECT_PW = 'alba2026';
let failCount = 0;
let lockUntil = 0;

function checkPW() {
  const now = Date.now();
  if (now < lockUntil) {
    const sec = Math.ceil((lockUntil - now) / 1000);
    showErr('잠시 후 다시 시도하세요 (' + sec + '초)');
    return;
  }
  const input = document.getElementById('pw-input').value;
  if (input === CORRECT_PW) {
    // 성공
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('pw-input').value = '';
    failCount = 0;
    init();
  } else {
    // 실패
    failCount++;
    document.getElementById('pw-input').value = '';
    const box = document.querySelector('.lock-box');
    box.classList.remove('shake');
    void box.offsetWidth; // reflow
    box.classList.add('shake');
    if (failCount >= 5) {
      lockUntil = Date.now() + 30000; // 30초 잠금
      showErr('비밀번호 5회 오류 — 30초 후 재시도');
      failCount = 0;
    } else {
      showErr('비밀번호가 틀렸습니다 (' + failCount + '/5)');
    }
  }
}

function showErr(msg) {
  const el = document.getElementById('pw-err');
  el.textContent = msg;
  setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
}

function lockApp() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('lock').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-err').textContent = '';
}

// Enter 키로 확인
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPW();
});

// ═══════════════════════════════════════
// 상태
// ═══════════════════════════════════════
let months = 3;
let selT = null;
let houses = [];

// ═══════════════════════════════════════
// 날짜 유틸
// ═══════════════════════════════════════
function monthsAgo(ds) {
  if (!ds) return Infinity;
  const d = new Date(ds), t = new Date();
  return (t.getFullYear()-d.getFullYear())*12 + (t.getMonth()-d.getMonth());
}
function fmtDate(ds) {
  if (!ds) return '기록없음';
  const [y,m,d] = ds.split('-');
  return y.slice(2)+'/'+m+'/'+d;
}
function countUV(t) {
  return t.houses.filter(h => !h.dnc && monthsAgo(h.last_date) >= months).length;
}

// ═══════════════════════════════════════
// 구역 목록 렌더
// ═══════════════════════════════════════
function renderList() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const container = document.getElementById('t-list');
  container.innerHTML = '';
  TERRITORIES.forEach((t, i) => {
    if (q && !t.name.toLowerCase().includes(q) && !t.area.toLowerCase().includes(q)) return;
    const uv = countUV(t);
    const tag = t.signed_out ? 'tag-out' : (uv > 0 ? 'tag-warn' : 'tag-ok');
    const row = document.createElement('div');
    row.className = 't-row ' + tag + (i===selT?' selected':'');
    row.innerHTML =
      '<span class="t-name" title="'+esc(t.name)+'">'+esc(t.name)+'</span>'+
      '<span class="t-area" title="'+esc(t.area)+'">'+esc(t.area)+'</span>'+
      '<span class="t-uv '+(uv>0?'has':'none')+'">'+(uv>0?'🔴 '+uv:'✅ 0')+'</span>'+
      '<span class="t-total">'+t.total+'</span>'+
      '<span class="t-st"><span class="badge '+(t.signed_out?'b-out':'b-ok')+'">'+(t.signed_out?'반출':'가능')+'</span></span>';
    row.onclick = () => { selectT(i); if(isMobile()) showTab('detail'); };
    container.appendChild(row);
  });
}

// ═══════════════════════════════════════
// 구역 선택
// ═══════════════════════════════════════
function selectT(i) {
  selT = i;
  renderList();
  const t = TERRITORIES[i];
  const uv = countUV(t);
  document.getElementById('ch-title').textContent =
    t.name + '  |  ' + t.area + '  |  총 ' + t.total + '집';
  let sub = '';
  if (t.completed) sub += '완료: ' + t.completed;
  if (t.signed_out) sub += (sub?'  |  ':'') + '🔴 반출: ' + t.signed_out_by;
  sub += (sub?'  |  ':'') + '미방문 '+uv+'집 / 전체 '+t.houses.length+'집';
  document.getElementById('ch-sub').textContent = sub;
  document.getElementById('empty-msg').style.display = 'none';
  document.getElementById('h-table').style.display = 'table';
  houses = t.houses;
  renderHouses();
  const nc = document.getElementById('note-txt');
  nc.textContent = '집을 클릭하면 노트가 표시됩니다';
  nc.style.color = 'var(--text3)'; nc.style.fontStyle = 'italic';
}

// ═══════════════════════════════════════
// 집 목록 렌더
// ═══════════════════════════════════════
function renderHouses() {
  const tbody = document.getElementById('h-body');
  tbody.innerHTML = '';
  houses.forEach((h, j) => {
    const mo = monthsAgo(h.last_date);
    let cls='', dtTxt=fmtDate(h.last_date), dtStyle='';
    if (h.dnc || h.status==='Do not call') {
      cls='row-x'; dtTxt='방문금지';
    } else if (!h.last_date) {
      cls='row-y';
    } else if (mo >= months) {
      cls='row-r'; dtStyle='color:#fca5a5;font-weight:700';
    } else {
      cls='row-g'; dtStyle='color:#6ee7b7';
    }
    const stCls = (h.dnc||h.status==='Do not call') ? 'sb-dnc'
                : h.status==='Valid' ? 'sb-valid' : 'sb-new';
    const tr = document.createElement('tr');
    tr.className = cls;
    tr.innerHTML =
      '<td class="td-mk">'+esc(h.marker)+'</td>'+
      '<td class="td-addr">'+esc(h.address)+'</td>'+
      '<td class="td-dt" style="'+dtStyle+'">'+dtTxt+'</td>'+
      '<td class="td-st"><span class="sb '+stCls+'">'+esc(h.status||'-')+'</span></td>'+
      '<td class="td-note">'+esc((h.notes||'').replace(/\n/g,' ').slice(0,80))+'</td>';
    tr.onclick = () => selectH(j, tr);
    tbody.appendChild(tr);
  });
}

// ═══════════════════════════════════════
// 집 선택
// ═══════════════════════════════════════
function selectH(j, tr) {
  document.querySelectorAll('#h-body tr.sel-row').forEach(r=>r.classList.remove('sel-row'));
  tr.classList.add('sel-row');
  const h = houses[j];
  const nc = document.getElementById('note-txt');
  nc.style.color='var(--text2)'; nc.style.fontStyle='normal';
  nc.textContent = h.notes || '(노트 없음)';
  if (isMobile()) document.getElementById('note-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ═══════════════════════════════════════
// 개월수 적용
// ═══════════════════════════════════════
function applyMonths() {
  months = parseFloat(document.getElementById('months-input').value) || 3;
  renderList();
  if (selT !== null) {
    const t = TERRITORIES[selT];
    const uv = countUV(t);
    document.getElementById('ch-sub').textContent =
      document.getElementById('ch-sub').textContent.replace(/미방문 \d+집/, '미방문 '+uv+'집');
    renderHouses();
  }
}
document.getElementById('months-input').addEventListener('keydown', e => { if(e.key==='Enter') applyMonths(); });

// ═══════════════════════════════════════
// 모바일 탭
// ═══════════════════════════════════════
function isMobile() { return window.innerWidth <= 768; }
function showTab(tab) {
  const sb=document.getElementById('sidebar'), ct=document.getElementById('content');
  if (tab==='list') {
    sb.classList.remove('hidden'); ct.classList.add('hidden');
    document.getElementById('tab-list').classList.add('active');
    document.getElementById('tab-detail').classList.remove('active');
  } else {
    sb.classList.add('hidden'); ct.classList.remove('hidden');
    document.getElementById('tab-detail').classList.add('active');
    document.getElementById('tab-list').classList.remove('active');
  }
}

// ═══════════════════════════════════════
// 파일 열기
// ═══════════════════════════════════════
function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseAndLoad(e.target.result, file.name);
  reader.readAsText(file, 'utf-8');
  input.value = '';
}
function parseAndLoad(htmlStr, fname) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlStr, 'text/html');
    const cards = doc.querySelectorAll('div.card');
    const result = [];
    cards.forEach(card => {
      let h1=null;
      for(const h of card.querySelectorAll('h1')){ if(h.querySelector('strong')){h1=h;break;} }
      if(!h1) return;
      const name = h1.querySelector('strong').textContent.trim();
      const mEl = h1.querySelector('.muted');
      const area = mEl ? mEl.textContent.trim() : '';
      const info = [...card.querySelectorAll('p')].map(p=>p.textContent).join(' ');
      const am=info.match(/(\d+)\s+addresses/), total=am?parseInt(am[1]):0;
      const cm=info.match(/Last completed (.+?)\./), completed=cm?cm[1].trim():'';
      const signed_out=info.includes('Signed out');
      const sm=info.match(/Signed out by (.+?)(?:\.|,|\n|$)/), signed_out_by=sm?sm[1].trim():'';
      const houseList=[];
      const tbody=card.querySelector('table.addresses tbody');
      if(tbody) {
        tbody.querySelectorAll('tr').forEach(row=>{
          const tds=row.querySelectorAll('td');
          if(tds.length<6) return;
          const mkS=tds[0].querySelector('strong'), marker=mkS?mkS.textContent.trim():'';
          const stS=tds[2].querySelector('strong'), status=stS?stS.textContent.trim():'';
          const dnc=!!tds[4].querySelector('strike');
          const address=tds[4].textContent.trim(), notes=tds[5].textContent.trim();
          const ds=parseDates(notes);
          const last_date=ds.length?ds.reduce((a,b)=>a>b?a:b):null;
          houseList.push({marker,address,status,dnc,notes,last_date});
        });
      }
      result.push({name,area,total,completed,signed_out,signed_out_by,houses:houseList});
    });
    TERRITORIES.length=0; result.forEach(t=>TERRITORIES.push(t));
    selT=null; houses=[];
    document.getElementById('stat').textContent=result.length+'개 구역 | '+fname;
    document.getElementById('search').value='';
    document.getElementById('empty-msg').style.display='flex';
    document.getElementById('h-table').style.display='none';
    document.getElementById('ch-title').textContent='← 구역을 선택하세요';
    document.getElementById('ch-sub').textContent='';
    renderList();
  } catch(e) { alert('파싱 오류: '+e); }
}
function parseDates(text) {
  const res=[]; const re=/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/g; let m;
  while((m=re.exec(text))!==null) {
    const a=+m[1],b=+m[2],c=+m[3]; const yr=c>100?c:2000+c;
    if(a>=1&&a<=12&&b>=1&&b<=31) { try{const d=new Date(yr,a-1,b);if(!isNaN(d))res.push(d.toISOString().slice(0,10));}catch(e){} }
    if(a>=21&&a<=30&&b>=1&&b<=12&&c>=1&&c<=31) { try{const d=new Date(2000+a,b-1,c);if(!isNaN(d))res.push(d.toISOString().slice(0,10));}catch(e){} }
  }
  return res;
}

// ═══════════════════════════════════════
// 드래그 앤 드롭
// ═══════════════════════════════════════
const ov=document.getElementById('drop-ov');
document.addEventListener('dragover',e=>{e.preventDefault();ov.classList.add('on');});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget)ov.classList.remove('on');});
document.addEventListener('drop',e=>{
  e.preventDefault();ov.classList.remove('on');
  const f=e.dataTransfer.files[0];
  if(f&&f.name.endsWith('.html')){const r=new FileReader();r.onload=ev=>parseAndLoad(ev.target.result,f.name);r.readAsText(f,'utf-8');}
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  const total = TERRITORIES.reduce((s,t)=>s+t.houses.length,0);
  document.getElementById('stat').textContent =
    TERRITORIES.length+'개 구역 · '+total+'개 집 | 2026-03-19';
  renderList();
}
